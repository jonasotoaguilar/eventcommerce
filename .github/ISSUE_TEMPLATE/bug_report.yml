name: Bug Report
description: Reportá un bug en EventCommerce
labels: ["bug", "status:needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## 📋 How this works

        1. **Submit** this bug report → it gets the `status:needs-review` label automatically
        2. A **maintainer reviews** it and adds `status:approved` (or closes it as invalid/duplicate)
        3. **Only then** should you (or anyone) open a PR to fix it

        PRs that fix issues without `status:approved` will be automatically rejected.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Revisé los issues existentes de EventCommerce y esto no es un duplicado
          required: true
        - label: Entiendo que un PR será rechazado si el issue vinculado no tiene `status:approved`
          required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: Describí el bug de forma clara y concreta.
      placeholder: Describí el bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce
      description: Pasos para reproducir el problema.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: ¿Qué esperabas que pasara?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: ¿Qué pasó realmente?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 🖥️ Environment

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Indicá la versión relevante o el commit SHA si aplica.
      placeholder: "e.g. 2a19f4c"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch/Manjaro)
        - Linux (Fedora/RHEL)
        - Linux (Other)
        - Windows
        - Windows (WSL)
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: AI Agent / Client
      description: Which AI agent or client are you using?
      options:
        - Claude Code
        - OpenCode
        - Gemini CLI
        - Cursor
        - Windsurf
        - Codex
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 📋 Affected Area
      options:
        - Backend / API HTTP
        - Orders module
        - Inventory module
        - Payments module
        - Notifications module
        - Shared config / database
        - Tooling / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 💡 Logs / Error Output
      description: Paste any relevant log output. This will be auto-formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Agregá contexto adicional, payloads, screenshots, configuración o ejemplos relevantes.
    validations:
      required: false
